server {
    listen 80;
    server_name app.wss13.com.br;

    # ACME challenge (certbot) — sem redirect
    location /.well-known/acme-challenge/ {
        root /var/www/app-wss13;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.wss13.com.br;

    ssl_certificate     /etc/nginx/ssl/app-wss13.crt;
    ssl_certificate_key /etc/nginx/ssl/app-wss13.key;

    root /var/www/app-wss13;
    index index.html;

    location ~ ^/(api|auth|health) {
        proxy_pass http://172.19.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
