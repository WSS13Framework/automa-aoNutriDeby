# ── Jitsi Meet — meet.nutrideby.com ──────────────────────────────────────────
# Cloudflare termina HTTPS. Este bloco recebe HTTP do Cloudflare e faz proxy
# para o container Jitsi web (porta 8000 no host, acessível via gateway 172.19.0.1).
# NAO MODIFICAR: nutrideby.conf (api.nutrideby.com, painel.nutrideby.com)

server {
    listen 80;
    server_name meet.nutrideby.com;

    # Real IP do visitante via Cloudflare
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Proxy para Jitsi web (HTTP, porta 8000 no host — acessível pelo gateway)
    location /.well-known/acme-challenge/ { root /var/www/html; try_files $uri =404; }

    location ~ ^/(interface_config|config)\.js$ {
        proxy_pass         http://172.19.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_hide_header  Cache-Control;
        proxy_hide_header  Expires;
        add_header         Cache-Control "no-store, must-revalidate";
    }

    location / {
        proxy_pass         http://172.19.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}

server {
    listen 443 ssl;
    server_name meet.nutrideby.com;

    ssl_certificate     /etc/nginx/ssl/meet.crt;
    ssl_certificate_key /etc/nginx/ssl/meet.key;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
