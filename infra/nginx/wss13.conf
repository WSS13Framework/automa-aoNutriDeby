server {
    listen 80;
    server_name wss13.com.br www.wss13.com.br;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name wss13.com.br www.wss13.com.br;
    ssl_certificate /etc/nginx/conf.d/ssl/wss13.crt;
    ssl_certificate_key /etc/nginx/conf.d/ssl/wss13.key;
    root /var/www/wss13;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /api/leads {
        proxy_pass http://172.19.0.1:8082/leads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
    }
    location /api/run {
        proxy_pass http://172.19.0.1:8082/run;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
    }
    location /api/health {
        proxy_pass http://172.19.0.1:8082/health;
        proxy_http_version 1.1;
        proxy_read_timeout 5s;
    }
}
