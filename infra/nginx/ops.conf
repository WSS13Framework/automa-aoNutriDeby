# ── NutriDeby OPS Panel — ops.nutrideby.com ───────────────────────────────────
# Acesso restrito por Basic Auth. Nunca expor sem senha configurada.

server {
    listen 80;
    server_name ops.nutrideby.com;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    real_ip_header CF-Connecting-IP;

    location / {
        auth_basic           "NutriDeby OPS";
        auth_basic_user_file /etc/nginx/ops_htpasswd;

        proxy_pass         http://ops-panel:8501;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }
}
