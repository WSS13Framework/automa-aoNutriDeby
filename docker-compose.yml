services:
  postgres:
    # pgvector para coluna chunks.embedding (Plano B — ver docs/decisao-embeddings-vector-store.md)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nutrideby
      POSTGRES_PASSWORD: nutrideby_dev
      POSTGRES_DB: nutrideby
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrideby -d nutrideby"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Só localhost no host — evita Redis exposto à Internet (DigitalOcean / scans).
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      # Sobrescreve .env se lá tiver localhost — dentro do contentor o host é o serviço ``postgres``.
      DATABASE_URL: postgresql://nutrideby:nutrideby_dev@postgres:5432/nutrideby
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data:ro
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "nutrideby.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql://nutrideby:nutrideby_dev@postgres:5432/nutrideby
      REDIS_URL: redis://redis:6379/0
    # Host 8081: evita colisão com outros serviços (ex.: outro contentor em 8080).
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    profiles:
      - api

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file:
      - ./dashboard/.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    profiles:
      - api

volumes:
  pgdata:
