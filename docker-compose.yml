services:
  postgres:
    # pgvector para coluna chunks.embedding (Plano B — ver docs/decisao-embeddings-vector-store.md)
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nutrideby
      POSTGRES_PASSWORD: nutrideby_dev
      POSTGRES_DB: nutrideby
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrideby -d nutrideby"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # Só localhost no host — evita Redis exposto à Internet (DigitalOcean / scans).
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      # Sobrescreve .env se lá tiver localhost — dentro do contentor o host é o serviço ``postgres``.
      DATABASE_URL: postgresql://nutrideby:nutrideby_dev@postgres:5432/nutrideby
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data:ro
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "nutrideby.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8080",
      ]
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: postgresql://nutrideby:nutrideby_dev@postgres:5432/nutrideby
      REDIS_URL: redis://redis:6379/0
    # Host 8081: evita colisão com outros serviços (ex.: outro contentor em 8080).
    ports:
      - "127.0.0.1:84:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    profiles:
      - api

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file:
      - ./dashboard/.env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    profiles:
      - api

  worker-kiwify:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "while true; do
        python3 -m nutrideby.workers.process_kiwify_inbox --limit 50;
        sleep 60;
      done"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped


  worker-token-watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "while true; do
        python3 -m nutrideby.workers.token_watchdog;
        sleep 86400;
      done"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "127.0.0.1:8085:8080"
    environment:
      - AUTHENTICATION_API_KEY=nutrideby_evo_key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://nutrideby:nutrideby_dev@postgres:5432/evolution
      - DATABASE_URL=postgresql://nutrideby:nutrideby_dev@postgres:5432/evolution
      - DATABASE_URL=postgresql://nutrideby:nutrideby_dev@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      - DATABASE_SAVE_DATA_CONTACTS=false
      - DATABASE_SAVE_DATA_CHATS=false
      - CACHE_REDIS_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped


  ops-panel:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "pip install streamlit pandas psycopg2-binary -q &&
             streamlit run src/ops/dashboard.py
             --server.port 8501
             --server.address 0.0.0.0
             --server.headless true
             --server.enableCORS false
             --server.enableXsrfProtection false
             --browser.gatherUsageStats false"
    env_file: .env
    environment:
      - DB_HOST=postgres
      - DB_NAME=nutrideby
      - DB_USER=nutrideby
      - DB_PORT=5432
      - HERMES_LOG=/var/log/nutrideby/hermes.log
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OPS_REDIRECT_URI=https://ops.nutrideby.com/
      - OPS_ALLOWED_EMAILS=${OPS_ALLOWED_EMAILS:-wss13.framework@gmail.com,nutrideboraoliver@gmail.com}
    volumes:
      - ./src:/app/src:ro
      - /var/log/nutrideby:/var/log/nutrideby:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d
      - ./infra/nginx/ssl:/etc/nginx/ssl
      - /var/www:/var/www
    restart: unless-stopped

volumes:
  pgdata:
  evolution_data:
